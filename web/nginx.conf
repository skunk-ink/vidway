# Vidway frontend — nginx config for the Vite-built static bundle.
# Used by the runtime stage of web/Dockerfile.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Disable nginx version disclosure.
    server_tokens off;

    # Compression: text-y assets only. nginx compresses on the fly;
    # Vite already produces minified JS/CSS so this is mostly about
    # the wire format. WASM is included because @ffmpeg/core itself
    # is loaded from a CDN, but if you ever self-host wasm here, this
    # helps.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml;

    # Vite emits hashed filenames into /assets/, so they're safe to
    # cache forever. Anything else (the entry index.html, favicons,
    # etc.) gets the default short-TTL behavior.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must NEVER be cached by the browser. It's the entry
    # point that points at the hashed JS/WASM bundles; if the browser
    # holds onto a stale copy it'll keep loading the old hashes even
    # after a deploy. Old hashes that no longer exist on disk will hit
    # the `try_files ... /index.html` SPA fallback below, which serves
    # back HTML that the browser tries to parse as JS/WASM — silent
    # corruption that manifests as the page hanging on "Initializing".
    #
    # A quick-and-dirty repro: deploy v1, load it in a browser, deploy
    # v2 with different bundle hashes. The browser still has v1's
    # index.html cached, requests v1's hashed assets, gets v2's
    # index.html back from the SPA fallback, and explodes.
    #
    # `must-revalidate` makes the browser hit the server every time
    # to confirm the HTML hasn't changed; the server returns 304 if
    # nothing's new, so the cost is one HTTP HEAD per page load.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # SPA fallback: any non-asset URL that doesn't resolve to a real
    # file falls through to index.html, where react-router takes over.
    # This is what makes /v/<id>, /mine, /upload survive a hard reload.
    #
    # IMPORTANT: this only catches paths that don't have an extension
    # the browser would expect to be a real file. We exclude common
    # asset extensions explicitly so a missing .js/.wasm/.css returns
    # 404 instead of HTML — without this, a stale browser cache
    # requesting a deleted asset would get back the entry HTML and
    # try to parse it as JavaScript or WebAssembly, which silently
    # hangs `WebAssembly.instantiateStreaming` rather than throwing.
    location ~* \.(js|mjs|cjs|wasm|css|map|json|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|ico|webp|avif|mp4|webm)$ {
        try_files $uri =404;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
