# docker compose up [-d] [--build]
#
# Two services with unambiguous names:
#
#   vidway-api  → Hono server on internal port 8787, also exposed
#                 on host as ${API_PORT:-8787}.
#   vidway-web  → nginx static bundle on internal port 80, also
#                 exposed on host as ${WEB_PORT:-8080}.
#
# Both join an external network named `caddy` so a Caddy container
# in another compose project can reach them by service name. Create
# the network once with:
#
#   docker network create caddy
#
# The browser loads the web app from whatever public URL Caddy
# answers on, and talks to the API at VITE_VIDWAY_API_URL. Both
# values come from .env.

services:
  vidway-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: vidway-api
    # Host port is optional for direct/dev access. Caddy doesn't use
    # it — it reaches the container as `vidway-api:8787` on the
    # shared network.
    ports:
      - "${API_PORT:-8787}:8787"
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_PATH: /data/vidway.db
      # Origin the browser uses to load the web app — must match
      # what Caddy serves it on, including the scheme (https vs http).
      CORS_ORIGIN: ${WEB_PUBLIC_ORIGIN:-http://localhost:8080}
    volumes:
      - ./api/data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8787/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  vidway-web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        # The API URL the browser will use. Baked into the JS bundle
        # at build time. Must be the public URL the browser can hit,
        # NOT a docker-internal hostname.
        VITE_VIDWAY_API_URL: ${VITE_VIDWAY_API_URL:-http://localhost:8787}
    container_name: vidway-web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      vidway-api:
        condition: service_started
    restart: unless-stopped

# Use a single shared network for everything, including any other
# compose project (e.g. Caddy) that declares it as `external: true`.
# This is what makes `vidway-api` and `vidway-web` resolvable from
# inside Caddy's container via Docker's embedded DNS.
networks:
  default:
    name: caddy
    external: true
